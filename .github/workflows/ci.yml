
name: CI/CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Coverage
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go-version: ['1.24.2']
        golangci-lint-version: ['2.24.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          go test -v -race -coverprofile=coverage/coverage.out -covermode=atomic ./...
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build for Linux
        run: |
          GOOS=linux GOARCH=amd64 go build -o loglint-linux-amd64 ./cmd/loglint
          GOOS=linux GOARCH=arm64 go build -o loglint-linux-arm64 ./cmd/loglint

      - name: Build for Windows
        run: |
          GOOS=windows GOARCH=amd64 go build -o loglint-windows-amd64.exe ./cmd/loglint

      - name: Build for macOS
        run: |
          GOOS=darwin GOARCH=amd64 go build -o loglint-darwin-amd64 ./cmd/loglint
          GOOS=darwin GOARCH=arm64 go build -o loglint-darwin-arm64 ./cmd/loglint

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loglint-binaries-${{ github.sha }}
          path: |
            loglint-*.exe
            loglint-*
          retention-days: 0

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ matrix.golangci-lint-version }}
          args: --timeout=5m

  format:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check gofmt
        run: |
          test -z "$(gofmt -l . | tee /dev/stderr)"
